<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ball base -->
  <circle cx="50" cy="50" r="48" fill="url(#ballGrad)"/>
  
  <!-- Shine -->
  <circle cx="35" cy="32" r="14" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Seam - vertical curve left -->
  <path d="M 30 10 C 10 30, 10 70, 30 90" 
        fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Seam - vertical curve right -->
  <path d="M 70 10 C 90 30, 90 70, 70 90" 
        fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Seam stitches left -->
  <line x1="26" y1="30" x2="34" y2="33" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="22" y1="40" x2="31" y2="42" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="21" y1="50" x2="30" y2="50" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="22" y1="60" x2="31" y2="58" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="26" y1="70" x2="34" y2="67" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round"/>
  
  <!-- Seam stitches right -->
  <line x1="74" y1="30" x2="66" y2="33" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="78" y1="40" x2="69" y2="42" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="79" y1="50" x2="70" y2="50" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="78" y1="60" x2="69" y2="58" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="74" y1="70" x2="66" y2="67" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round"/>

  <defs>
    <radialGradient id="ballGrad" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#ff6b6b"/>
      <stop offset="45%"  stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#7b1a10"/>
    </radialGradient>
  </defs>
</svg>
